bot:
  max_prs_per_day: 5
  max_diff_lines: 200
  min_confidence_score: 0.3

  search_labels:
    - "good first issue"

  search_language: "python"
  max_issues_per_run: 30

  max_repo_inactivity_days: 90
  max_repo_stars: 5000
  min_repo_stars: 5

  # 🔥 REMOVE THIS for real usage
  repo_allowlist: []

  excluded_topics:
    - "hacktoberfest"
    - "spam"

  skip_issue_labels:
    - "discussion"
    - "question"
    - "wontfix"
    - "invalid"
